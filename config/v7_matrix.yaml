version: "7.0"
scope: "skill_admission"
decision_semantics:
  pass: "本次准入检查未发现需要阻断、复核或整改的风险，不代表绝对无风险"
  pass_after_remediation: "风险真实但可由作者在入库前修复，复扫确认后可准入"
  manual_review: "自动检测证据不足或存在中风险组合，需要安全人员确认"
  reject: "存在不可接受的高风险，当前技能不得入库"

columns:
  - id
  - name
  - severity
  - scenarios
  - detection_goal
  - detection_steps
  - evidence_required
  - admission_decision
  - acceptable_compensation
  - platform_defense
  - sources

sources:
  SRC-OWASP-AGENT: "OWASP AI Agent Security Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/AI_Agent_Security_Cheat_Sheet.html"
  SRC-OWASP-LLM: "OWASP Top 10 for Large Language Model Applications: https://owasp.org/www-project-top-10-for-large-language-model-applications/"
  SRC-OWASP-MCP: "OWASP MCP Security Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/MCP_Security_Cheat_Sheet.html"
  SRC-OWASP-PROMPT: "OWASP LLM Prompt Injection Prevention Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html"
  SRC-CWE: "MITRE CWE: https://cwe.mitre.org/data/index.html"
  SRC-NIST-AI-RMF: "NIST AI Risk Management Framework: https://www.nist.gov/itl/ai-risk-management-framework"
  SRC-NIST-SSDF: "NIST SP 800-218 Secure Software Development Framework: https://csrc.nist.gov/publications/detail/sp/800-218/final"
  SRC-NIST-800-53: "NIST SP 800-53 Rev.5: https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"
  SRC-NTIA-SBOM: "NTIA Minimum Elements for a Software Bill of Materials: https://www.ntia.gov/report/2021/minimum-elements-software-bill-materials-sbom"
  SRC-OWASP-FILE: "OWASP File Upload Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/File_Upload_Cheat_Sheet.html"
  SRC-OWASP-SSRF: "OWASP SSRF Prevention Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"
  SRC-OWASP-LOGGING: "OWASP Logging Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html"
  SRC-OWASP-TLS: "OWASP Transport Layer Security Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Security_Cheat_Sheet.html"
  SRC-OWASP-DESER: "OWASP Deserialization Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/Deserialization_Cheat_Sheet.html"
  SRC-PIPL: "中华人民共和国个人信息保护法: https://www.gov.cn/xinwen/2021-08/20/content_5632486.htm"

items:
  - id: "V7-001"
    name: "恶意代码与破坏性行为"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测系统破坏、勒索、挖矿、反弹 Shell、任意命令执行等主动恶意能力"
    detection_steps:
      - "扫描源码和脚本中的危险命令、反弹连接、挖矿关键字、批量删除逻辑"
      - "对命中位置做上下文复核，排除文档示例和测试夹具"
      - "沙箱执行可疑入口，观察进程、网络、文件写入和系统调用"
    evidence_required: ["命中文件", "行号", "代码片段", "沙箱行为日志"]
    admission_decision: "命中真实恶意能力则不通过"
    acceptable_compensation: "不接受补偿"
    platform_defense: "沙箱隔离和出口限制只能降低运行期影响，不能替代准入修复"
    sources: ["SRC-OWASP-AGENT", "SRC-CWE"]
  - id: "V7-002"
    name: "后门与条件触发逻辑"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测特定口令、时间、环境变量、隐藏参数触发的未声明能力"
    detection_steps: ["扫描 magic string、debug secret、隐藏路由和时间触发", "比对声明与实际行为", "动态验证可疑触发条件"]
    evidence_required: ["触发条件", "代码位置", "触发后的实际行为"]
    admission_decision: "存在隐藏高风险能力则不通过"
    acceptable_compensation: "不接受补偿"
    platform_defense: "运行时审计可作为辅助发现手段"
    sources: ["SRC-OWASP-AGENT", "SRC-CWE"]
  - id: "V7-003"
    name: "敏感数据外发与隐蔽通道"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测环境变量、密钥、文件、上下文、用户数据被发送到未声明目标或隐蔽通道"
    detection_steps: ["提取网络目标、DNS 查询、HTTP 请求、Webhook 和 socket 调用", "建立敏感源到网络 sink 的数据流", "沙箱中阻断外联并记录目的地"]
    evidence_required: ["敏感源", "外联目标", "数据流路径", "请求证据"]
    admission_decision: "未声明敏感数据外发则不通过"
    acceptable_compensation: "不接受补偿；仅声明不充分但用途合理时可整改后复扫"
    platform_defense: "出口白名单、DLP、请求审计"
    sources: ["SRC-OWASP-AGENT", "SRC-OWASP-LLM", "SRC-CWE"]
  - id: "V7-004"
    name: "硬编码真实凭证"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测代码和配置中的真实密码、Token、API Key、AK/SK、私钥等敏感凭证"
    detection_steps: ["扫描凭证关键字、私钥头、云厂商 Key 格式和高熵字符串", "排除空值、占位符、环境变量引用和示例文档", "对疑似真实凭证做人工确认并脱敏展示"]
    evidence_required: ["脱敏后的凭证片段", "文件位置", "凭证类型"]
    admission_decision: "真实凭证泄露则不通过"
    acceptable_compensation: "不接受补偿，必须移除并轮换"
    platform_defense: "Secret 扫描、密钥托管、凭证轮换"
    sources: ["SRC-CWE"]
  - id: "V7-005"
    name: "许可证验证配置缺陷"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测许可证、授权、激活、订阅校验是否存在默认本地服务、失败放行、可伪造响应等缺陷"
    detection_steps: ["搜索 license、verify、validate、activate、entitlement 等授权逻辑", "检查默认地址是否为 localhost、127.0.0.1 或不可信 HTTP", "检查验证失败分支是否 fail closed", "模拟验证失败、超时、伪造成功响应"]
    evidence_required: ["授权服务配置", "失败分支代码", "动态验证日志"]
    admission_decision: "验证失败仍继续运行或可伪造授权则不通过"
    acceptable_compensation: "仅默认地址不安全但失败关闭时，可整改后通过"
    platform_defense: "平台统一许可证校验代理、禁止本地授权服务"
    sources: ["SRC-CWE"]
  - id: "V7-006"
    name: "技能声明与实际行为一致性"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测 SKILL.md、README.md 等声明是否覆盖权限、网络、文件、命令、数据处理和外部依赖"
    detection_steps: ["提取 SKILL.md，缺失时读取 README.md 和其他 Markdown 声明", "从源码提取实际能力清单", "比对声明能力和实际行为", "对未声明的高风险能力进行人工复核"]
    evidence_required: ["声明摘录", "实际行为证据", "差异项"]
    admission_decision: "隐藏高风险行为则不通过；声明缺失或不完整则可整改后通过"
    acceptable_compensation: "可通过补全文档和权限声明整改"
    platform_defense: "入库前强制声明模板"
    sources: ["SRC-OWASP-AGENT", "SRC-NIST-AI-RMF"]
  - id: "V7-007"
    name: "MCP 工具滥用与工具权限过大"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测是否诱导 Agent 使用高危 MCP 工具，或工具权限超出技能目的"
    detection_steps: ["枚举 MCP 工具、工具描述和权限范围", "检查 wildcard 权限、任意命令执行、任意文件读写", "检查提示词是否诱导绕过审批或静默执行"]
    evidence_required: ["工具清单", "权限范围", "危险调用点"]
    admission_decision: "未经限制的高危工具能力则不通过"
    acceptable_compensation: "可通过最小权限、allowlist、审批补偿整改"
    platform_defense: "MCP 工具权限管控、工具调用审计"
    sources: ["SRC-OWASP-AGENT", "SRC-OWASP-MCP"]
  - id: "V7-008"
    name: "沙箱逃逸与提权风险"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测突破沙箱、访问宿主机、提权、ptrace、mount、namespace 滥用等行为"
    detection_steps: ["静态扫描提权相关系统调用和宿主机路径", "沙箱执行并记录 seccomp、capability、namespace 事件", "验证是否访问宿主敏感路径或提升权限"]
    evidence_required: ["系统调用", "路径", "沙箱告警"]
    admission_decision: "存在逃逸或提权能力则不通过"
    acceptable_compensation: "不接受补偿"
    platform_defense: "强制 seccomp、capability 最小化、只读文件系统"
    sources: ["SRC-CWE", "SRC-OWASP-AGENT"]
  - id: "V7-009"
    name: "自更新与远程下载执行"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测技能是否绕过入库审查，自行下载、替换或执行远程代码"
    detection_steps: ["扫描 auto_update、download_and_exec、curl pipe shell、动态安装后执行", "检查下载内容是否校验签名和是否执行", "沙箱中拦截下载并记录执行链"]
    evidence_required: ["下载 URL", "执行命令", "校验逻辑"]
    admission_decision: "远程下载执行或自更新则不通过"
    acceptable_compensation: "不接受补偿；依赖下载应转入供应链流程"
    platform_defense: "仓库入库后内容冻结、运行时禁写代码目录"
    sources: ["SRC-NIST-SSDF"]
  - id: "V7-010"
    name: "依赖漏洞与恶意依赖"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测第三方依赖是否存在高危漏洞、恶意包、拼写欺诈、未锁版本或不可信源"
    detection_steps: ["解析 lockfile、go.mod、package.json、requirements", "匹配 OSV、NVD、GitHub Advisory 等漏洞库", "检查包名相似度、维护状态和下载源", "验证是否锁定版本和校验哈希"]
    evidence_required: ["依赖名", "版本", "漏洞编号", "来源 URL", "修复版本"]
    admission_decision: "可利用高危漏洞或恶意依赖则不通过；可升级漏洞则可整改后通过"
    acceptable_compensation: "临时虚拟补丁只适合作为短期例外"
    platform_defense: "私有源代理、依赖准入、漏洞告警"
    sources: ["SRC-OWASP-LLM", "SRC-NIST-SSDF"]
  - id: "V7-011"
    name: "动态指令注入与可执行上下文拼接"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测用户输入、外部文档或工具响应是否进入 Prompt、Shell、SQL、eval、模板等可执行上下文"
    detection_steps: ["标记不可信输入源", "追踪到 LLM prompt、exec、eval、SQL、shell、模板渲染等 sink", "检查参数化、边界分隔、转义和白名单", "用对抗样本验证绕过"]
    evidence_required: ["源点", "sink 点", "拼接路径", "防护证据"]
    admission_decision: "无防护进入高危执行上下文则不通过"
    acceptable_compensation: "参数化、安全 API、隔离上下文可整改"
    platform_defense: "网关输入校验、Prompt 注入护栏"
    sources: ["SRC-OWASP-LLM", "SRC-OWASP-PROMPT", "SRC-CWE"]
  - id: "V7-012"
    name: "权限声明与最小权限"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测声明权限是否超过功能所需，读写、网络、命令、文件权限是否可细粒度约束"
    detection_steps: ["解析权限声明", "从源码提取实际权限使用", "对比声明权限、实际使用、功能需要", "标记未使用的敏感权限和过宽路径"]
    evidence_required: ["权限差异清单", "调用证据"]
    admission_decision: "过度申请敏感权限且无合理理由则不通过"
    acceptable_compensation: "可通过缩小权限范围整改"
    platform_defense: "运行时强制最小权限"
    sources: ["SRC-OWASP-AGENT", "SRC-NIST-800-53"]
  - id: "V7-013"
    name: "路径遍历与文件越权"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测文件读写是否可通过路径拼接越权访问工作区外文件或敏感路径"
    detection_steps: ["追踪用户输入到文件路径 API", "检查路径规范化和根目录边界校验", "使用 ../、绝对路径、编码路径测试"]
    evidence_required: ["输入样本", "目标路径", "越权证据"]
    admission_decision: "可越权读写敏感文件则不通过"
    acceptable_compensation: "可通过路径规范化和边界校验整改"
    platform_defense: "文件系统沙箱"
    sources: ["SRC-CWE"]
  - id: "V7-014"
    name: "SSRF 与内网探测"
    severity: "高风险"
    scenarios: ["准入"]
    detection_goal: "检测外部 URL 请求是否可访问内网、metadata、localhost 或绕过 DNS/IP 校验"
    detection_steps: ["查找 HTTP client、URL fetch、Webhook、代理转发", "检查 allowlist、私网 IP、重定向、DNS rebinding 防护", "使用 127.0.0.1、169.254.169.254、私网网段和重定向样本测试"]
    evidence_required: ["请求点", "目标地址", "绕过样本"]
    admission_decision: "可访问内网或 metadata 服务则不通过"
    acceptable_compensation: "严格 allowlist 可整改"
    platform_defense: "出口代理、私网地址拦截"
    sources: ["SRC-CWE", "SRC-OWASP-SSRF"]
  - id: "V7-015"
    name: "工具响应投毒与间接提示注入"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测 MCP/API/网页/文档返回内容是否被当作指令注入 Agent 上下文"
    detection_steps: ["查找外部响应进入 prompt 或 memory 的路径", "检查是否标记为不可信数据并做隔离", "用恶意响应样本验证是否改变工具调用或系统指令"]
    evidence_required: ["外部响应样本", "上下文拼接点", "绕过结果"]
    admission_decision: "可诱导高危工具调用则不通过；普通污染风险需人工复核"
    acceptable_compensation: "隔离上下文、摘要前置、响应清洗可整改"
    platform_defense: "上下文注入防护、工具响应网关"
    sources: ["SRC-OWASP-AGENT", "SRC-OWASP-LLM"]
  - id: "V7-016"
    name: "凭据缓存与跨任务隔离"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测是否明文缓存用户凭据、复用跨用户会话、长期保存 token 或共享全局状态"
    detection_steps: ["搜索 credential、token、session、cache、global state", "检查加密、TTL、作用域、用户隔离", "构造两个会话验证是否串数据"]
    evidence_required: ["缓存位置", "TTL", "隔离机制", "复现实验"]
    admission_decision: "跨用户泄露或明文长期保存敏感凭据则不通过"
    acceptable_compensation: "加密、TTL、按用户命名空间可整改"
    platform_defense: "会话隔离、凭据托管"
    sources: ["SRC-OWASP-AGENT", "SRC-CWE"]
  - id: "V7-017"
    name: "敏感上下文与错误信息泄露"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测系统提示词、密钥、内部路径、堆栈、环境变量是否输出给用户或日志"
    detection_steps: ["扫描输出、日志、错误处理和响应构造", "触发异常路径并观察输出", "检查脱敏和错误模板"]
    evidence_required: ["输出样本", "日志样本", "泄露字段"]
    admission_decision: "直接泄露密钥或系统提示词则不通过；泄露路径或堆栈可整改"
    acceptable_compensation: "脱敏和统一错误处理可整改"
    platform_defense: "日志脱敏、响应过滤"
    sources: ["SRC-OWASP-LLM", "SRC-CWE"]
  - id: "V7-018"
    name: "外部软依赖完整性"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测外部 Prompt 模板、规则库、知识库、MCP 工具描述、远程配置是否可被替换或投毒"
    detection_steps: ["枚举运行时加载的远程资源", "检查来源 allowlist、签名、哈希、版本固定", "模拟资源被篡改后的行为"]
    evidence_required: ["远程资源清单", "完整性校验证据"]
    admission_decision: "可被替换并改变安全行为则不通过；缺少校验可整改"
    acceptable_compensation: "签名、哈希、版本锁定"
    platform_defense: "平台托管模板和工具描述"
    sources: ["SRC-OWASP-AGENT", "SRC-NIST-SSDF"]
  - id: "V7-019"
    name: "不可逆或高影响操作审批"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测删除、支付、发信、提交代码、修改权限等高影响操作是否有人审、预览和取消机制"
    detection_steps: ["枚举高影响工具调用", "检查执行前是否生成预览", "检查是否需要明确确认", "验证拒绝或超时后不会执行"]
    evidence_required: ["操作类型", "审批流程", "失败分支证据"]
    admission_decision: "高影响操作无审批且可直接执行则不通过"
    acceptable_compensation: "增加 HITL、预览和回滚说明可整改"
    platform_defense: "平台统一审批网关"
    sources: ["SRC-OWASP-AGENT", "SRC-NIST-AI-RMF"]
  - id: "V7-020"
    name: "输入 Schema 与边界校验"
    severity: "中风险"
    scenarios: ["准入"]
    detection_goal: "检测工具接口是否定义类型、长度、格式、枚举、范围和必填约束"
    detection_steps: ["枚举工具入口和 API handler", "检查 JSON Schema、Pydantic、Zod、validator 等", "使用空值、超长、非法类型、边界值测试"]
    evidence_required: ["接口清单", "Schema", "边界测试结果"]
    admission_decision: "高危工具缺少输入校验则需人工复核或整改"
    acceptable_compensation: "补充 Schema 和服务端校验可整改"
    platform_defense: "网关输入校验"
    sources: ["SRC-CWE"]
  - id: "V7-021"
    name: "日志审计与敏感信息脱敏"
    severity: "低风险"
    scenarios: ["准入"]
    detection_goal: "检测是否记录关键安全事件，且日志不会明文写入凭据、个人信息和系统提示词"
    detection_steps: ["查找安全相关操作的日志点", "检查敏感字段脱敏", "触发失败、拒绝、审批、外联等路径验证日志"]
    evidence_required: ["日志字段", "脱敏样本", "覆盖路径"]
    admission_decision: "明文记录凭据则不通过；审计不足可整改"
